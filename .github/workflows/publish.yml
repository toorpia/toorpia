# PyPI への公開ワークフロー (Trusted Publishing / OIDC)
#
# GitHub Release の公開をトリガーに sdist + wheel をビルドして PyPI へアップロードする。
# APIトークンは不要（PyPI 側で Trusted Publisher として本リポジトリ・本ワークフロー・
# environment "pypi" を登録しておくこと。手順は docs/releasing.md を参照）。
# 初回公開やリトライは Actions タブから手動実行（workflow_dispatch）できる。
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      # Release トリガー時はタグとパッケージのバージョン不一致を検出して失敗させる
      - name: Verify tag matches package version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "v$VERSION" ]; then
            echo "::error::Release tag $TAG does not match pyproject.toml version v$VERSION"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/toorpia
    permissions:
      id-token: write  # Trusted Publishing (OIDC) に必須
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
